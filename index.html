<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--fg:#e2e8f0;--fg2:#94a3b8;--acc:#3b82f6;--g:#4285F4;--m:#1877F2;
--exc:#22c55e;--good:#86efac;--ok:#fbbf24;--bad:#f97316;--crit:#ef4444;--na:#475569;
--r:12px;--r2:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;line-height:1.4;}
.wrap{max-width:640px;margin:0 auto;padding:env(safe-area-inset-top,12px) 12px env(safe-area-inset-bottom,16px);}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;}
.hdr-title{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.hdr-sub{font-size:11px;color:var(--fg2);margin-top:2px;}
.hdr-badge{background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--fg2);white-space:nowrap;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.kpi-wide{grid-column:span 2;}
.kpi{background:var(--bg2);border-radius:var(--r);padding:12px 14px;border-top:3px solid var(--bg3);}
.kpi.goog{border-top-color:var(--g);}
.kpi.meta{border-top-color:var(--m);}
.kpi.tot{border-top-color:var(--acc);}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--fg2);font-weight:600;}
.kpi-val{font-size:22px;font-weight:800;margin-top:2px;letter-spacing:-.5px;}
.kpi-sub{font-size:11px;color:var(--fg2);margin-top:1px;}

/* SecciÃ³n */
.sec{margin-bottom:20px;}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bg3);}
.sec-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.sec-icon.g{background:var(--g);} .sec-icon.m{background:var(--m);} .sec-icon.a{background:#dc2626;}
.sec-title{font-size:15px;font-weight:700;}
.sec-total{font-size:11px;color:var(--fg2);margin-left:auto;text-align:right;}

/* Cards de campaÃ±a */
.camp-list{display:flex;flex-direction:column;gap:6px;}
.camp-card{background:var(--bg2);border-radius:var(--r2);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.camp-card:active{opacity:.85;}
.camp-left{flex:1;min-width:0;}
.camp-marca{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--fg2);}
.camp-nombre{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.camp-stats{font-size:10px;color:var(--fg2);margin-top:2px;}
.camp-right{text-align:right;flex-shrink:0;}
.camp-cpl{font-size:15px;font-weight:800;line-height:1.1;}
.camp-cpl-lbl{font-size:9px;color:var(--fg2);}
.camp-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block;}

/* Detalle expandible */
.camp-detail{display:none;background:var(--bg3);border-radius:0 0 var(--r2) var(--r2);padding:10px 12px;margin-top:-4px;font-size:11px;color:var(--fg2);}
.camp-detail.open{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;}
.camp-detail span{display:flex;justify-content:space-between;}
.camp-detail span b{color:var(--fg);}

/* Colores CPL */
.t-exc .camp-cpl{color:var(--exc);}  .b-exc{background:#14532d;color:var(--exc);}
.t-good .camp-cpl{color:var(--good);} .b-good{background:#166534;color:#bbf7d0;}
.t-ok .camp-cpl{color:var(--ok);}   .b-ok{background:#78350f;color:#fde68a;}
.t-bad .camp-cpl{color:var(--bad);} .b-bad{background:#7c2d12;color:#fed7aa;}
.t-crit .camp-cpl{color:var(--crit);} .b-crit{background:#7f1d1d;color:#fecaca;}
.t-na .camp-cpl{color:var(--na);}   .b-na{background:var(--bg3);color:var(--fg2);}

/* Alertas */
.alert-card{background:#1c0a0a;border:1px solid #7f1d1d;border-radius:var(--r2);padding:10px 12px;margin-bottom:6px;}
.alert-plat{font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;}
.alert-name{font-size:12px;font-weight:600;margin-top:2px;}
.alert-amt{font-size:13px;font-weight:800;color:#fca5a5;float:right;}

/* Ver mÃ¡s */
.ver-mas{text-align:center;padding:8px;color:var(--fg2);font-size:11px;cursor:pointer;margin-top:-4px;}

/* Footer */
.footer{text-align:center;font-size:10px;color:var(--fg2);padding:16px 0 4px;border-top:1px solid var(--bg3);margin-top:8px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
</style>
</head>

","t":"na"},{"m":"USADOS","c":"USADOS | Leads | 2026 - WHATSAPP","imp":62257,"cl":1049,"gasto":236941,"leads":0,"cpl":0,"cplStr":"-","t":"na"}]],
  alertas:[{"plat":"Meta","c":"Kia_Whatsapp  2026","clp":349765},{"plat":"Meta","c":"USADOS | Leads | 2026 - WHATSAPP","clp":236941},{"plat":"Meta","c":"Trafico_Ford","clp":270896},{"plat":"Meta","c":"Campaña_Whatsapp","clp":176127}]
};

const fmt = n => '\$' + Math.round(n).toLocaleString('es-CL');
const fmtN = n => Math.round(n).toLocaleString('es-CL');
const badgeTxt = {exc:'âœ… Excepcional',good:'âœ… Bueno',ok:'âš ï¸ Moderado',bad:'ðŸ”´ Caro',crit:'ðŸš¨ CrÃ­tico',na:'â€” Sin leads'};
const badgeCls = {exc:'b-exc',good:'b-good',ok:'b-ok',bad:'b-bad',crit:'b-crit',na:'b-na'};
const typeCls  = {exc:'t-exc',good:'t-good',ok:'t-ok',bad:'t-bad',crit:'t-crit',na:'t-na'};

// KPIs
const kg = document.getElementById('kpiGrid');
kg.innerHTML =
  kpi('goog','Google Ads',fmt(D.spG),fmtN(D.convG)+' conv &nbsp;Â·&nbsp; CPL '+fmt(D.cplG))+
  kpi('meta','Meta Ads',fmt(D.spM),fmtN(D.leadsM)+' leads &nbsp;Â·&nbsp; CPL '+fmt(D.cplM))+
  kpi('tot kpi-wide','Total Combinado',fmt(D.spT),'<b>'+fmtN(D.totConv)+'</b> resultados &nbsp;Â·&nbsp; CPL global '+fmt(D.cplT));

function kpi(cls,lbl,val,sub){
  return '<div class="kpi '+cls+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';
}

// SecciÃ³n Google Ads

renderList('listG', D.google, 'google', 5);

// SecciÃ³n Meta Ads
const sm = document.getElementById('secMeta');
sm.innerHTML = '<div class="sec-hdr"><div class="sec-icon m">f</div><div class="sec-title">Meta Ads</div><div class="sec-total">'+fmtN(D.leadsM)+' leads &nbsp;Â·&nbsp; CPL '+fmt(D.cplM)+'</div></div><div class="camp-list" id="listM"></div><div class="ver-mas" id="moreM" onclick="showMore(\'listM\',\'moreM\')">Ver todas las campaÃ±as â–¾</div>';
renderList('listM', D.meta, 'meta', 6);

// Alertas
const sa = document.getElementById('secAlertas');
if(D.alertas.length > 0){
  let html = '<div class="sec-hdr"><div class="sec-icon a">!</div><div class="sec-title">Sin leads medibles</div></div>';
  D.alertas.forEach(a=>{
    html += '<div class="alert-card"><span class="alert-plat">'+a.plat+'</span><span class="alert-amt">'+fmt(a.clp)+' CLP</span><div class="alert-name">'+a.c+'</div></div>';
  });

}

function renderList(id, data, tipo, limit) {
  const el = document.getElementById(id);
  const subset = data.slice(0, limit);
  el.innerHTML = subset.map((c,i) => campCard(c, tipo, i)).join('');
  if(data.length <= limit) document.getElementById(id.replace('list','more')).style.display='none';
  el.dataset.all = JSON.stringify(data);
  el.dataset.tipo = tipo;
}

function campCard(c, tipo, i) {
  const isG = tipo === 'google';
  const metricLabel = isG ? 'Conv' : 'Leads';
  const metricVal   = isG ? fmtN(c.conv||0) : fmtN(c.leads||0);
  const metricCost  = isG ? fmt(c.costo||0) : fmt(c.gasto||0);
  const metricImp   = fmtN(c.imp||0);
  const tcls = typeCls[c.t] || 't-na';
  const bcls = badgeCls[c.t] || 'b-na';
  const btxt = badgeTxt[c.t] || 'â€”';
  return '<div class="camp-card '+tcls+'" onclick="toggle(\'det-'+tipo+'-'+i+'\')">' +
    '<div class="camp-left">' +
      '<div class="camp-marca">'+escH(c.m)+'</div>' +
      '<div class="camp-nombre">'+escH(c.c)+'</div>' +
      '<div class="camp-stats">'+metricLabel+': <b>'+metricVal+'</b> &nbsp;Â·&nbsp; Gasto: '+metricCost+'</div>' +
    '</div>' +
    '<div class="camp-right">' +
      '<div class="camp-cpl">'+c.cplStr+'</div>' +
      '<div class="camp-cpl-lbl">CLP/'+metricLabel.toLowerCase()+'</div>' +
      '<span class="camp-badge '+bcls+'">'+btxt+'</span>' +
    '</div>' +
  '</div>' +
  '<div class="camp-detail" id="det-'+tipo+'-'+i+'">' +
    '<span>Impresiones<b>'+metricImp+'</b></span>' +
    '<span>Clics<b>'+fmtN(c.cl||0)+'</b></span>' +
    '<span>'+metricLabel+'<b>'+metricVal+'</b></span>' +
    '<span>Gasto<b>'+metricCost+'</b></span>' +
  '</div>';
}

function toggle(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.toggle('open');
}

function showMore(listId, moreId) {
  const el = document.getElementById(listId);
  const data = JSON.parse(el.dataset.all);
  const tipo = el.dataset.tipo;
  el.innerHTML = data.map((c,i) => campCard(c, tipo, i)).join('');
  document.getElementById(moreId).style.display = 'none';
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
